<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇游戏</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
        }
        h1 {
            color: #00ffff;
            margin-bottom: 6px;
            font-size: 2.4em;
            letter-spacing: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1em;
        }
        .stats span {
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }
        #level {
            color: #ff00ff !important;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.6), 0 0 20px rgba(255, 0, 255, 0.3) !important;
            font-size: 1.2em;
        }
        #score {
            color: #00ffff !important;
        }
        #highScore {
            color: #ffcc00 !important;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.4) !important;
        }
        canvas {
            border: none;
            background: #0a0a1a;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.15), inset 0 0 20px rgba(0, 255, 255, 0.1);
            border-radius: 4px;
        }
        #message {
            color: #fff;
            font-size: 1.4em;
            margin-top: 14px;
            min-height: 36px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
        }
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.25);
            border-radius: 6px;
            color: #00e5ff;
            font-size: 0.85em;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(0,229,255,0.15);
            border-color: rgba(0,229,255,0.5);
            box-shadow: 0 0 15px rgba(0,229,255,0.2);
            color: #fff;
        }
        .controls {
            color: rgba(200, 220, 255, 0.35);
            margin-top: 12px;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            opacity: 0.15;
        }
        .corner-tl { top: 15px; left: 15px; border-top: 2px solid #00ffff; border-left: 2px solid #00ffff; }
        .corner-tr { top: 15px; right: 15px; border-top: 2px solid #00ffff; border-right: 2px solid #00ffff; }
        .corner-bl { bottom: 15px; left: 15px; border-bottom: 2px solid #ff00ff; border-left: 2px solid #ff00ff; }
        .corner-br { bottom: 15px; right: 15px; border-bottom: 2px solid #ff00ff; border-right: 2px solid #ff00ff; }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">&#8592; 返回首页</a>
    <div class="scanline"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="container">
        <h1>贪吃蛇</h1>
        <div class="stats">
            <span id="level">关卡 1</span>
            <span id="score">分数: 0</span>
            <span id="highScore">最高分: 0</span>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="message">按空格键开始游戏</div>
        <div class="controls">方向键 / WASD 控制方向 | 空格键暂停 / 继续</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const messageDisplay = document.getElementById('message');
        const levelDisplay = document.getElementById('level');
        const highScoreDisplay = document.getElementById('highScore');

        let highScore = 0;
        try { highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0; } catch(e) {}
        highScoreDisplay.textContent = '最高分: ' + highScore;

        function updateScoreDisplay() {
            scoreDisplay.textContent = '分数: ' + score;
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = '最高分: ' + highScore;
            }
        }

        function updateLevelDisplay() {
            const newLevel = Math.floor(score / 50) + 1;
            if (newLevel !== currentLevel) {
                currentLevel = newLevel;
                levelDisplay.textContent = '关卡 ' + currentLevel;
            }
        }

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameLoop = null;
        let gameRunning = false;
        let gameOver = false;
        let speed = 150;
        let obstacles = [];
        let foodEaten = 0;
        const OBSTACLE_INTERVAL = 5;
        let frameCount = 0;
        let currentLevel = 1;

        function initGame() {
            snake = [
                { x: 7, y: 15 },
                { x: 6, y: 15 },
                { x: 5, y: 15 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 150;
            obstacles = [];
            foodEaten = 0;
            gameOver = false;
            currentLevel = 1;
            levelDisplay.textContent = '关卡 1';
            updateScoreDisplay();
            spawnFood();
        }

        function spawnFood() {
            let attempts = 0;
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                attempts++;
            } while (
                (snake.some(seg => seg.x === food.x && seg.y === food.y) ||
                obstacles.some(obs => obs.x === food.x && obs.y === food.y)) &&
                attempts < 1000
            );
        }

        function spawnObstacle() {
            let attempts = 0;
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                attempts++;
            } while (
                (snake.some(seg => seg.x === pos.x && seg.y === pos.y) ||
                (pos.x === food.x && pos.y === food.y) ||
                obstacles.some(obs => obs.x === pos.x && obs.y === pos.y)) &&
                attempts < 1000
            );
            if (attempts < 1000) obstacles.push(pos);
        }

        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                endGame();
                return;
            }

            if (obstacles.some(obs => obs.x === head.x && obs.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScoreDisplay();
                updateLevelDisplay();
                foodEaten++;
                if (foodEaten % OBSTACLE_INTERVAL === 0) {
                    spawnObstacle();
                }
                spawnFood();
                if (speed > 60) {
                    speed -= 1.5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, speed);
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            frameCount++;

            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(0, 255, 255, 0.06)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            const pulseAlpha = 0.7 + 0.3 * Math.sin(frameCount * 0.08);
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#ff00ff';
            ctx.globalAlpha = pulseAlpha;
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ff0033';
            ctx.fillStyle = '#ff0033';
            obstacles.forEach(obs => {
                ctx.fillRect(
                    obs.x * gridSize + 1,
                    obs.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;

            const totalSegments = snake.length;
            snake.forEach((segment, index) => {
                const t = totalSegments > 1 ? index / (totalSegments - 1) : 0;
                const r = Math.round(0 + t * 255);
                const g = Math.round(255 - t * 255);
                const b = Math.round(255 - t * 255);
                const segColor = `rgb(${r}, ${g}, ${b})`;

                ctx.shadowBlur = 12;
                ctx.shadowColor = index === 0 ? '#00ffff' : '#ff00ff';
                ctx.fillStyle = segColor;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                ctx.shadowBlur = 0;

                if (index === 0) {
                    ctx.fillStyle = '#0a0a1a';
                    const eyeOffset = direction.x !== 0 ? 5 : 3;
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 + direction.x * eyeOffset - 3,
                        segment.y * gridSize + gridSize / 2 + direction.y * eyeOffset - 3,
                        2, 0, Math.PI * 2
                    );
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 + direction.x * eyeOffset + 3,
                        segment.y * gridSize + gridSize / 2 + direction.y * eyeOffset - 3,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
            });
        }

        function gameStep() {
            update();
            draw();
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                try { localStorage.setItem('snakeHighScore', highScore); } catch(e) {}
                updateScoreDisplay();
            }
            messageDisplay.textContent = '游戏结束! 得分: ' + score + ' | 按空格键重新开始';
        }

        function startGame() {
            if (gameOver) {
                initGame();
            }
            if (!gameRunning) {
                gameRunning = true;
                messageDisplay.textContent = '';
                gameLoop = setInterval(gameStep, speed);
            }
        }

        function togglePause() {
            if (gameOver) {
                startGame();
                return;
            }
            if (gameRunning) {
                gameRunning = false;
                clearInterval(gameLoop);
                messageDisplay.textContent = '游戏暂停 - 按空格键继续';
            } else {
                startGame();
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (key === ' ' || key === 'spacebar') {
                e.preventDefault();
                if (!gameRunning && !gameOver) {
                    startGame();
                } else {
                    togglePause();
                }
                return;
            }

            if (!gameRunning) return;

            switch (key) {
                case 'arrowup':
                case 'w':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'arrowdown':
                case 's':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'arrowleft':
                case 'a':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'arrowright':
                case 'd':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
            e.preventDefault();
        });

        initGame();
        draw();
    </script>
</body>
</html>
