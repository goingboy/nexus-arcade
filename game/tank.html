    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        .container { text-align: center; position: relative; }
        h1 {
            color: #00ffff;
            margin-bottom: 8px;
            font-size: 2.8em;
            letter-spacing: 10px;
            text-shadow: 0 0 10px rgba(0,255,255,0.8), 0 0 20px rgba(0,255,255,0.5), 0 0 40px rgba(0,255,255,0.3);
        }
        canvas {
            background: #111;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0,255,255,0.6), 0 0 60px rgba(0,255,255,0.2);

            border-radius: 4px;
            image-rendering: pixelated;
        }

        .corner-tl { top: 15px; left: 15px; border-top: 2px solid #00ffff; border-left: 2px solid #00ffff; }
        .corner-tr { top: 15px; right: 15px; border-top: 2px solid #00ffff; border-right: 2px solid #00ffff; }
        .corner-bl { bottom: 15px; left: 15px; border-bottom: 2px solid #ff00ff; border-left: 2px solid #ff00ff; }
        .corner-br { bottom: 15px; right: 15px; border-bottom: 2px solid #ff00ff; border-right: 2px solid #ff00ff; }
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.25);
            border-radius: 6px;
            color: #00e5ff;
            font-size: 0.85em;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(0,229,255,0.15);
            border-color: rgba(0,229,255,0.5);
            box-shadow: 0 0 15px rgba(0,229,255,0.2);
            color: #fff;
        }
        .controls {
            color: rgba(200,220,255,0.4);
            margin-top: 10px;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

</head>

let particles = [];
class Particle {
    constructor(x, y, c) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 5; this.vy = (Math.random() - 0.5) * 5;
        this.color = c; this.life = 25 + Math.random() * 15; this.size = 3 + Math.random() * 3;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; this.size *= 0.94; }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life / 40);
        ctx.fillStyle = this.color;
        ctx.fillRect(Math.round(this.x), Math.round(this.y), this.size, this.size);
        ctx.globalAlpha = 1;
    }
}
function createParticles(x, y, c, n) { for (let i = 0; i < n; i++) particles.push(new Particle(x, y, c)); }

let currentMap = [];

function generateCoopMaps() {
    const maps = [];
    for (let m = 0; m < 20; m++) {
        const map = [];
        for (let y = 0; y < MAP_ROWS; y++) {
            map[y] = [];
            for (let x = 0; x < MAP_COLS; x++) {
                if (x === 0 || x === MAP_COLS - 1 || y === 0 || y === MAP_ROWS - 1) {
                    map[y][x] = TILE.STEEL;
                } else if (x === 9 && y === 7) {
                    map[y][x] = TILE.BASE;
                } else if (Math.random() < 0.18) {
                    map[y][x] = Math.random() < 0.8 ? TILE.BRICK : TILE.STEEL;
                } else if (Math.random() < 0.05) {
                    map[y][x] = Math.random() < 0.5 ? TILE.WATER : TILE.GRASS;
                } else {
                    map[y][x] = TILE.EMPTY;
                }
            }
        }
        // 清理出生点 (2格范围)
        for (let dy = 0; dy < 2; dy++) for (let dx = 0; dx < 2; dx++) {
            map[1 + dy][1 + dx] = TILE.EMPTY;
            map[1 + dy][MAP_COLS - 2 - dx] = TILE.EMPTY;
            map[MAP_ROWS - 2 - dy][1 + dx] = TILE.EMPTY;
            map[MAP_ROWS - 2 - dy][MAP_COLS - 2 - dx] = TILE.EMPTY;
        }
        // 清理基地周围通道 (宽3格)
        for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
            const ny = 7 + dy, nx = 9 + dx;
            if (ny > 0 && ny < MAP_ROWS - 1 && nx > 0 && nx < MAP_COLS - 1) {
                if (map[ny][nx] !== TILE.BASE) map[ny][nx] = TILE.EMPTY;
            }
        }
        // 生成连接通道
        for (let i = 0; i < 8; i++) {
            const sx = 2 + Math.floor(Math.random() * (MAP_COLS - 4));
            const sy = 2 + Math.floor(Math.random() * (MAP_ROWS - 4));
            const len = 3 + Math.floor(Math.random() * 4);
            const horizontal = Math.random() < 0.5;
            for (let j = 0; j < len; j++) {
                const nx = horizontal ? sx + j : sx;
                const ny = horizontal ? sy : sy + j;
                if (nx > 0 && nx < MAP_COLS - 1 && ny > 0 && ny < MAP_ROWS - 1 && map[ny][nx] !== TILE.BASE) {
                    map[ny][nx] = TILE.EMPTY;
                }
            }
        }
        maps.push(map);
    }
    return maps;
}

function drawMap() {
    for (let y = 0; y < currentMap.length; y++) {
        for (let x = 0; x < currentMap[y].length; x++) {
            const tile = currentMap[y][x];
            const props = TILE_PROPS[tile];
            if (!props || !props.color) continue;
            const px = x * TILE_SIZE, py = y * TILE_SIZE;

            if (tile === TILE.WATER) {
                ctx.fillStyle = '#0D47A1';
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#1565C0';
                for (let i = 0; i < 3; i++) {
                    const wave = Math.sin(frameCount * 0.08 + x * 0.5 + i) * 3;
                    ctx.fillRect(px + 2, py + 8 + i * 10 + wave, TILE_SIZE - 4, 3);
                }
                ctx.strokeStyle = '#42A5F5';
                ctx.lineWidth = 1;
                ctx.strokeRect(px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2);
            } else if (tile === TILE.GRASS) {
                ctx.fillStyle = '#1B5E20';
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#2E7D32';
                for (let i = 0; i < 4; i++) {
                    ctx.fillRect(px + 3 + i * 7, py + 4, 3, TILE_SIZE - 8);
                }
                ctx.strokeStyle = '#388E3C';
                ctx.lineWidth = 1;
                ctx.strokeRect(px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2);
            } else if (tile === TILE.BRICK) {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(px + 2, py + 2, TILE_SIZE / 2 - 3, TILE_SIZE / 2 - 2);
                ctx.fillRect(px + TILE_SIZE / 2 + 1, py + 2, TILE_SIZE / 2 - 3, TILE_SIZE / 2 - 2);
                ctx.fillRect(px + 1, py + TILE_SIZE / 2 + 1, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
                ctx.fillRect(px + TILE_SIZE / 2, py + TILE_SIZE / 2 + 1, TILE_SIZE / 2 - 1, TILE_SIZE / 2 - 2);
                ctx.strokeStyle = '#5D3A1A';
                ctx.lineWidth = 1;
                ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
            } else if (tile === TILE.STEEL) {
                ctx.fillStyle = '#546E7A';
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#78909C';
                ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                ctx.fillStyle = '#90A4AE';
                ctx.fillRect(px + 4, py + 4, 6, 6);
                ctx.fillRect(px + TILE_SIZE - 10, py + TILE_SIZE - 10, 6, 6);
                ctx.strokeStyle = '#37474F';
                ctx.lineWidth = 2;
                ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
            } else if (tile === TILE.BASE) {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.shadowBlur = 20; ctx.shadowColor = '#FFD700';
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(px + 4, py + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(px + TILE_SIZE / 2 - 2, py + 6, 4, TILE_SIZE - 12);
                ctx.fillRect(px + TILE_SIZE / 2 + 2, py + 8, 10, 7);
            }
        }
    }
}

function drawGrassOverlay() {
    for (let y = 0; y < currentMap.length; y++) {
        for (let x = 0; x < currentMap[y].length; x++) {
            if (currentMap[y][x] === TILE.GRASS) {
                ctx.fillStyle = 'rgba(30,100,30,0.5)';
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }
}

let players = [], enemies = [], enemiesRemaining = 0, spawnTimer = 0;
const MAX_ACTIVE_ENEMIES = 4;

class Tank {
    constructor(x, y, type, player) {
        this.x = x * TILE_SIZE; this.y = y * TILE_SIZE;
        this.type = type; this.player = player;
        this.direction = player === 0 ? 0 : 2;
        this.health = TANK_TYPES[type].armor; this.maxHealth = TANK_TYPES[type].armor;
        this.speed = TANK_TYPES[type].speed; this.fireRate = TANK_TYPES[type].fireRate;
        this.color = TANK_TYPES[type].color;
        this.alive = true; this.shield = false; this.shieldTimer = 0;
        this.frozen = false; this.frozenTimer = 0; this.fireCooldown = 0;
        this.level = 1; this.moving = false;
        this.revives = 3; this.reviveTimer = 0; this.reviving = false;
    }
    update() {
        if (!this.alive) return;
        if (this.shield && --this.shieldTimer <= 0) this.shield = false;
        if (this.frozen && --this.frozenTimer <= 0) this.frozen = false;
        if (this.fireCooldown > 0) this.fireCooldown--;
    }
    canMoveTo(nx, ny) {
        if (nx < 0 || nx + TILE_SIZE > canvas.width || ny < 0 || ny + TILE_SIZE > canvas.height) return false;
        const c0 = Math.floor(nx / TILE_SIZE), c1 = Math.floor((nx + TILE_SIZE - 1) / TILE_SIZE);
        const r0 = Math.floor(ny / TILE_SIZE), r1 = Math.floor((ny + TILE_SIZE - 1) / TILE_SIZE);
        for (let r = r0; r <= r1; r++)
            for (let c = c0; c <= c1; c++)
                if (r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS && TILE_PROPS[currentMap[r][c]].solid) return false;
        return true;
    }
    move(dx, dy) {
        if (!this.alive || this.frozen) return;
        if (dy < 0) this.direction = 0; else if (dx > 0) this.direction = 1;
        else if (dy > 0) this.direction = 2; else if (dx < 0) this.direction = 3;
        const spd = this.speed;
        const nx = this.x + dx * spd, ny = this.y + dy * spd;
        if (this.canMoveTo(nx, ny)) { this.x = nx; this.y = ny; this.moving = true; }
        else this.moving = false;
    }
    shoot() {
        if (!this.alive || this.fireCooldown > 0) return null;
        this.fireCooldown = 40 - this.fireRate * 6;
        const spd = 5 + this.level;
        const bx = this.x + TILE_SIZE / 2, by = this.y + TILE_SIZE / 2;
        let dx = 0, dy = 0;
        if (this.direction === 0) dy = -spd; else if (this.direction === 1) dx = spd;
        else if (this.direction === 2) dy = spd; else dx = -spd;
        return new Bullet(bx, by, dx, dy, this.level, this.player);
    }
    takeDamage() {
        if (this.shield || !this.alive) return false;
        this.health--;
        if (this.health <= 0) {
            this.alive = false;
            explosions.push(new Explosion(this.x + TILE_SIZE / 2, this.y + TILE_SIZE / 2, 1));
            createParticles(this.x + TILE_SIZE / 2, this.y + TILE_SIZE / 2, this.color, 15);
            triggerShake(8);
            if (gameMode === 'coop' && this.player >= 0 && this.revives > 0) {
                this.revives--; this.reviveTimer = 180; this.reviving = true;
            }
        }
        return true;
    }
    revive() {
        if (!this.reviving) return;
        if (--this.reviveTimer <= 0) {
            this.reviving = false; this.alive = true; this.health = this.maxHealth;
            this.x = (this.player === 0 ? 1 : MAP_COLS - 2) * TILE_SIZE;
            this.y = (this.player === 0 ? 1 : MAP_ROWS - 2) * TILE_SIZE;
        }
    }
    draw() {
        if (!this.alive) return;
        const px = Math.round(this.x), py = Math.round(this.y);
        ctx.save();
        ctx.translate(px + TILE_SIZE / 2, py + TILE_SIZE / 2);
        ctx.rotate(this.direction * Math.PI / 2);
        // 车身
        ctx.shadowBlur = 8; ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        const s = TILE_SIZE / 2 - 2;
        ctx.fillRect(-s, -s, s * 2, s * 2);
        // 炮塔
        ctx.fillStyle = shadeColor(this.color, -30);
        ctx.beginPath(); ctx.arc(0, 0, TILE_SIZE / 4, 0, Math.PI * 2); ctx.fill();
        // 炮管
        ctx.fillStyle = this.color;
        ctx.fillRect(-3, -TILE_SIZE / 2 + 2, 6, TILE_SIZE / 2 - 2);
        ctx.shadowBlur = 0;
        ctx.restore();
        // 血条
        if (this.health < this.maxHealth) {
            const pct = this.health / this.maxHealth;
            ctx.fillStyle = '#000'; ctx.fillRect(px, py - 8, TILE_SIZE, 5);
            ctx.fillStyle = pct > 0.5 ? '#0f0' : pct > 0.25 ? '#ff0' : '#f00';
            ctx.fillRect(px + 1, py - 7, (TILE_SIZE - 2) * pct, 3);
        }
        // 护盾
        if (this.shield) {
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2; ctx.shadowBlur = 12; ctx.shadowColor = '#0ff';
            ctx.beginPath(); ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, TILE_SIZE / 2 + 3, 0, Math.PI * 2); ctx.stroke();
            ctx.shadowBlur = 0;
        }
        if (this.frozen) {
            ctx.fillStyle = 'rgba(100,200,255,0.4)'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
        }
    }
}

function shadeColor(c, p) {
    let r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
    r = Math.max(0, Math.min(255, r + p)); g = Math.max(0, Math.min(255, g + p)); b = Math.max(0, Math.min(255, b + p));
    return `rgb(${r},${g},${b})`;
}

class Enemy extends Tank {
    constructor(x, y, type) {
        super(x, y, type, -1);
        this.aiState = 'patrol'; this.target = null; this.moveTimer = 0; this.changeDirTimer = 0;
        this.patrolDir = [[0, -1], [1, 0], [0, 1], [-1, 0]][Math.floor(Math.random() * 4)];
    }
    update() {
        super.update();
        if (!this.alive) return;
        this.moveTimer++; this.changeDirTimer++;

        // 检测玩家
        let nearest = null, nearDist = Infinity;
        players.forEach(p => {
            if (p.alive) {
                const d = Math.hypot(this.x - p.x, this.y - p.y);
                if (d < nearDist) { nearDist = d; nearest = p; }
            }
        });

        if (nearest && nearDist < TILE_SIZE * 10) {
            this.target = nearest;
            const dx = nearest.x - this.x, dy = nearest.y - this.y;
            if (Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : -1, 0);
            else this.move(0, dy > 0 ? 1 : -1);
            // 面向玩家射击
            if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? 1 : 3;
            else this.direction = dy > 0 ? 2 : 0;
        } else {
            // 巡逻
            if (this.changeDirTimer > 90 + Math.random() * 90) {
                this.changeDirTimer = 0;
                this.patrolDir = [[0, -1], [1, 0], [0, 1], [-1, 0]][Math.floor(Math.random() * 4)];
            }
            this.move(this.patrolDir[0], this.patrolDir[1]);
        }

        // 射击 (降低频率)
        if (Math.random() < 0.015) {
            const b = this.shoot();
            if (b) { b.owner = -1; bullets.push(b); }
        }
    }
    draw() {
        if (!this.alive) return;
        const px = Math.round(this.x), py = Math.round(this.y);
        ctx.save();
        ctx.translate(px + TILE_SIZE / 2, py + TILE_SIZE / 2);
        ctx.rotate(this.direction * Math.PI / 2);
        ctx.shadowBlur = 8; ctx.shadowColor = '#f44';
        ctx.fillStyle = '#c00';
        const s = TILE_SIZE / 2 - 2;
        ctx.fillRect(-s, -s, s * 2, s * 2);
        ctx.fillStyle = '#f44';
        ctx.beginPath(); ctx.arc(0, 0, TILE_SIZE / 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f00';
        ctx.fillRect(-3, -TILE_SIZE / 2 + 2, 6, TILE_SIZE / 2 - 2);
        ctx.shadowBlur = 0;
        ctx.restore();
        if (this.health < this.maxHealth) {
            const pct = this.health / this.maxHealth;
            ctx.fillStyle = '#000'; ctx.fillRect(px, py - 8, TILE_SIZE, 5);
            ctx.fillStyle = '#f00'; ctx.fillRect(px + 1, py - 7, (TILE_SIZE - 2) * pct, 3);
        }
    }
}

function spawnEnemy() {
    if (enemies.filter(e => e.alive).length >= MAX_ACTIVE_ENEMIES || enemiesRemaining <= 0) return;
    const spawns = [{ x: 1, y: 1 }, { x: MAP_COLS - 2, y: 1 }, { x: 1, y: MAP_ROWS - 2 }, { x: MAP_COLS - 2, y: MAP_ROWS - 2 }];
    const s = spawns[Math.floor(Math.random() * spawns.length)];
    if (players.some(p => p.alive && Math.hypot(p.x - s.x * TILE_SIZE, p.y - s.y * TILE_SIZE) < TILE_SIZE * 3)) return;
    enemies.push(new Enemy(s.x, s.y, Math.floor(Math.random() * 3)));
    enemiesRemaining--;
}

function initPlayers() {
    players = [
        new Tank(1, 1, tankSelection[0], 0),
        new Tank(MAP_COLS - 2, MAP_ROWS - 2, tankSelection[1], 1)
    ];
    if (gameMode === 'coop') { players[0].revives = 3; players[1].revives = 3; }
}

let bullets = [];
class Bullet {
    constructor(x, y, dx, dy, level, owner) {
        this.x = x; this.y = y; this.dx = dx; this.dy = dy;
        this.level = level; this.owner = owner; this.alive = true; this.size = 3 + level;
    }
    update() {
        if (!this.alive) return;
        this.x += this.dx; this.y += this.dy;
        const col = Math.floor(this.x / TILE_SIZE), row = Math.floor(this.y / TILE_SIZE);
        if (row >= 0 && row < MAP_ROWS && col >= 0 && col < MAP_COLS) {
            const tile = currentMap[row][col];
            if (tile === TILE.BRICK) {
                currentMap[row][col] = TILE.EMPTY;
                explosions.push(new Explosion(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, 0.5));
                this.alive = false; return;
            }
            if (tile === TILE.STEEL) {
                if (this.level >= 2) currentMap[row][col] = TILE.EMPTY;
                this.alive = false; return;
            }
            if (tile === TILE.BASE) { this.alive = false; endGame(false); return; }
        }
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.alive = false;
    }
    draw() {
        if (!this.alive) return;
        const c = this.owner >= 0 ? (this.owner === 0 ? '#0ff' : '#f0f') : '#f88';
        ctx.shadowBlur = 10; ctx.shadowColor = c; ctx.fillStyle = c;
        ctx.beginPath(); ctx.arc(Math.round(this.x), Math.round(this.y), this.size, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function checkBulletCollisions() {
    bullets.forEach(bullet => {
        if (!bullet.alive) return;
        [...players, ...enemies].forEach(tank => {
            if (!tank.alive) return;
            if (bullet.owner === tank.player) return;
            const dist = Math.hypot(bullet.x - (tank.x + TILE_SIZE / 2), bullet.y - (tank.y + TILE_SIZE / 2));
            if (dist < TILE_SIZE / 2 + bullet.size) {
                if (tank.takeDamage()) {
                    bullet.alive = false;
                    explosions.push(new Explosion(bullet.x, bullet.y, 0.5));
                    createParticles(bullet.x, bullet.y, '#ff0', 5);
                }
            }
        });
    });
    bullets = bullets.filter(b => b.alive);
}

let explosions = [];
class Explosion {
    constructor(x, y, size) {
        this.x = x; this.y = y; this.size = size || 1;
        this.frame = 0; this.maxFrame = 18; this.alive = true;
    }
    update() { if (++this.frame >= this.maxFrame) this.alive = false; }
    draw() {
        if (!this.alive) return;
        const p = this.frame / this.maxFrame, r = this.size * TILE_SIZE * 0.6 * (1 + p), a = 1 - p;
        ctx.shadowBlur = 15; ctx.shadowColor = '#f60';
        ctx.fillStyle = `rgba(255,80,0,${a * 0.6})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, r * 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = `rgba(255,200,0,${a})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, r * 0.7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, r * 0.25, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

let powerups = [], powerupSpawnTimer = 0;
class PowerUp {
    constructor(x, y, type) {
        this.x = x * TILE_SIZE; this.y = y * TILE_SIZE;
        this.type = type; this.alive = true; this.spawnTime = frameCount; this.duration = 600;
    }
    update() { if (frameCount - this.spawnTime > this.duration) this.alive = false; }
    draw() {
        if (!this.alive) return;
        const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.12);
        const props = POWERUP_TYPES[this.type];
        ctx.shadowBlur = 15; ctx.shadowColor = props.color;
        ctx.globalAlpha = pulse; ctx.fillStyle = props.color;
        ctx.font = `${TILE_SIZE - 6}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(props.symbol, this.x + TILE_SIZE / 2, this.y + TILE_SIZE / 2);
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    apply(tank) {
        const eff = POWERUP_TYPES[this.type].effect;
        if (eff === 'upgrade') tank.level = Math.min(tank.level + 1, 3);
        else if (eff === 'shield') { tank.shield = true; tank.shieldTimer = 300; }
        else if (eff === 'freeze') {
            if (gameMode === 'pvp') {
                const o = players[tank.player === 0 ? 1 : 0]; o.frozen = true; o.frozenTimer = 180;
            } else enemies.forEach(e => { if (e.alive) { e.frozen = true; e.frozenTimer = 180; } });
        } else if (eff === 'bomb') {
            [...players, ...enemies].forEach(t => {
                if (t !== tank && t.alive && Math.hypot(t.x - tank.x, t.y - tank.y) < TILE_SIZE * 5) t.takeDamage();
            });
            explosions.push(new Explosion(tank.x + TILE_SIZE / 2, tank.y + TILE_SIZE / 2, 1));
            triggerShake(6);
        }
        this.alive = false;
    }
}

function spawnPowerUp() {
    if (powerups.length >= 3) return;
    let x, y, attempts = 0;
    do { x = 1 + Math.floor(Math.random() * (MAP_COLS - 2)); y = 1 + Math.floor(Math.random() * (MAP_ROWS - 2)); attempts++; }
    while (currentMap[y][x] !== TILE.EMPTY && attempts < 100);
    if (attempts < 100) powerups.push(new PowerUp(x, y, Math.floor(Math.random() * POWERUP_TYPES.length)));
}

function updatePowerUps() {
    if (++powerupSpawnTimer > 600) { powerupSpawnTimer = 0; spawnPowerUp(); }
    powerups.forEach(p => p.update()); powerups = powerups.filter(p => p.alive);
    players.forEach(pl => {
        if (!pl.alive) return;
        powerups.forEach(pu => {
            if (pu.alive && Math.hypot(pl.x - pu.x, pl.y - pu.y) < TILE_SIZE) pu.apply(pl);
        });
    });
}

const keys = {};
document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true; keys[e.code] = true;
    if (gameState === 'menu') {
        if (menuState === 'main') {
            if (e.key === 'w' || e.key === 'ArrowUp') menuSelection = (menuSelection - 1 + 2) % 2;
            if (e.key === 's' || e.key === 'ArrowDown') menuSelection = (menuSelection + 1) % 2;
            if (e.key === ' ' || e.key === 'Enter') { gameMode = menuSelection === 0 ? 'coop' : 'pvp'; menuState = 'tankSelect'; }
        } else if (menuState === 'tankSelect') {
            if (e.key === 'w') tankSelection[0] = (tankSelection[0] - 1 + 3) % 3;
            if (e.key === 's') tankSelection[0] = (tankSelection[0] + 1) % 3;
            if (e.key === 'ArrowUp') tankSelection[1] = (tankSelection[1] - 1 + 3) % 3;
            if (e.key === 'ArrowDown') tankSelection[1] = (tankSelection[1] + 1) % 3;
            if (e.key === ' ') startGame();
        }
        e.preventDefault();
    } else if (gameState === 'playing') {
        if (e.code === 'Space') { const b = players[0].shoot(); if (b) bullets.push(b); }
        if (e.code === 'Enter') { const b = players[1].shoot(); if (b) bullets.push(b); }
        if (e.key.toLowerCase() === 'p') { gameState = 'paused'; messageDisplay.textContent = '游戏暂停 - 按P继续'; }
    } else if (gameState === 'paused' && e.key.toLowerCase() === 'p') {
        gameState = 'playing'; messageDisplay.textContent = '';
    } else if (gameState === 'gameover' && e.key === ' ') {
        gameState = 'menu'; menuState = 'main'; currentLevel = 0; messageDisplay.textContent = '';
    }
    e.preventDefault();
});
document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; keys[e.code] = false; });

function handleInput() {
    if (gameState !== 'playing') return;
    if (keys['w']) players[0].move(0, -1);
    else if (keys['s']) players[0].move(0, 1);
    else if (keys['a']) players[0].move(-1, 0);
    else if (keys['d']) players[0].move(1, 0);
    else players[0].moving = false;
    if (keys['arrowup']) players[1].move(0, -1);
    else if (keys['arrowdown']) players[1].move(0, 1);
    else if (keys['arrowleft']) players[1].move(-1, 0);
    else if (keys['arrowright']) players[1].move(1, 0);
    else players[1].moving = false;
}

function drawUI() {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, 32);
    ctx.font = 'bold 14px Orbitron'; ctx.textAlign = 'left';
    ctx.fillStyle = '#888'; ctx.fillText(gameMode === 'coop' ? '合作模式' : 'PvP模式', 12, 22);
    ctx.fillStyle = '#ff0'; ctx.fillText(gameMode === 'coop' ? `关卡 ${currentLevel + 1}/20` : `第${currentRound + 1}局`, 130, 22);
    ctx.fillStyle = '#0ff'; ctx.textAlign = 'right'; ctx.fillText(`${score}`, canvas.width - 12, 22);

    for (let i = 0; i < 2; i++) {
        const p = players[i], bx = i === 0 ? 12 : canvas.width - 160, by = canvas.height - 28;
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(bx, by, 148, 18);
        ctx.fillStyle = '#000'; ctx.fillRect(bx + 2, by + 2, 144, 14);
        ctx.fillStyle = p.color; ctx.fillRect(bx + 2, by + 2, (p.health / p.maxHealth) * 144, 14);
        ctx.strokeStyle = p.color; ctx.lineWidth = 1; ctx.strokeRect(bx, by, 148, 18);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Orbitron'; ctx.textAlign = 'left';
        ctx.fillText(`P${i + 1} HP:${p.health}/${p.maxHealth}`, bx + 4, by + 13);
        if (gameMode === 'coop') {
            ctx.font = '10px Orbitron';
            if (p.reviving) { ctx.fillStyle = '#fc0'; ctx.fillText(`复活: ${Math.ceil(p.reviveTimer / 60)}s`, bx + 100, by - 6); }
            else { ctx.fillStyle = '#888'; ctx.fillText(`复活: ${p.revives}`, bx + 100, by - 6); }
        }
    }
    if (gameMode === 'coop') {
        ctx.fillStyle = '#f44'; ctx.font = 'bold 12px Orbitron'; ctx.textAlign = 'center';
        ctx.fillText(`敌人: ${enemiesRemaining + enemies.filter(e => e.alive).length}`, canvas.width / 2, canvas.height - 14);
    }
    ctx.textAlign = 'center';
}

function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.shadowBlur = 25; ctx.shadowColor = '#f00'; ctx.fillStyle = '#f00';

function drawVictory() {

function drawMenu() {

            ctx.fillText(`玩家${p + 1}`, bx, 190);

}

function startGame() {
    gameState = 'playing'; score = 0;
    bullets = []; explosions = []; powerups = []; enemies = []; particles = [];
    powerupSpawnTimer = 0; spawnTimer = 0;
    if (gameMode === 'coop') {
        currentMap = COOP_MAPS[currentLevel].map(r => [...r]);
        enemiesRemaining = 8 + currentLevel * 2;
    } else {
        currentMap = PVP_MAPS[currentPvpMap].map(r => [...r]);
    }
    initPlayers(); messageDisplay.textContent = '';
}

function endGame(playerWon) {
    gameState = 'gameover';
    if (gameMode === 'coop') {
        if (playerWon) {
            score += 1000; currentLevel++;
            if (currentLevel >= 20) { drawVictory(); return; }
            setTimeout(startGame, 2000);
        }
    } else {
        if (playerWon) pvpScores[0]++; else pvpScores[1]++;
        if (pvpScores[0] >= 2 || pvpScores[1] >= 2) { gameState = 'gameover'; }
        else { currentRound++; setTimeout(startGame, 2000); }
    }
}

let scoreTimer = 0;
function update() {
    if (gameState !== 'playing') return;
    handleInput();
    players.forEach(p => { p.update(); if (p.reviving) p.revive(); });
    if (gameMode === 'coop') { spawnTimer++; if (spawnTimer > 150) { spawnTimer = 0; spawnEnemy(); } }
    enemies.forEach(e => e.update());
    bullets.forEach(b => b.update());
    checkBulletCollisions();
    explosions.forEach(e => e.update()); explosions = explosions.filter(e => e.alive);
    particles.forEach(p => p.update()); particles = particles.filter(p => p.life > 0);
    updatePowerUps();
    // 得分: 每5秒加10分 (修复闪烁问题)
    scoreTimer++;
    if (scoreTimer >= 300) { scoreTimer = 0; score += 10; }

    if (gameMode === 'coop') {
        if (players.every(p => !p.alive && !p.reviving && p.revives <= 0)) endGame(false);
        if (enemiesRemaining <= 0 && enemies.filter(e => e.alive).length === 0 && players.some(p => p.alive)) {
            score += 500; endGame(true);
        }
    }
}

function draw() {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (screenShake > 0) {
        ctx.save();
        ctx.translate(Math.round((Math.random() - 0.5) * screenShake), Math.round((Math.random() - 0.5) * screenShake));
        screenShake *= 0.88;
        if (screenShake < 0.5) screenShake = 0;
    }
    switch (gameState) {
        case 'menu': drawMenu(); break;
        case 'playing':
            drawMap(); drawGrassOverlay();
            players.forEach(p => p.draw()); enemies.forEach(e => e.draw());
            bullets.forEach(b => b.draw()); explosions.forEach(e => e.draw());
            powerups.forEach(p => p.draw()); particles.forEach(p => p.draw());
            drawUI(); break;
        case 'paused':
            drawMap(); players.forEach(p => p.draw()); enemies.forEach(e => e.draw()); drawUI();
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 15; ctx.shadowColor = '#0ff'; ctx.fillStyle = '#0ff';
            ctx.font = 'bold 42px Orbitron'; ctx.textAlign = 'center';
            ctx.fillText('暂停', canvas.width / 2, canvas.height / 2); ctx.shadowBlur = 0;
            break;
        case 'gameover': drawGameOver(); break;
    }
    if (screenShake > 0) ctx.restore();
}

function gameLoop(ts) {
    const dt = ts - lastTime;
    if (dt >= FRAME_TIME) { lastTime = ts - (dt % FRAME_TIME); update(); draw(); frameCount++; }
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

function resizeCanvas() {
    const maxW = window.innerWidth - 40, maxH = window.innerHeight - 120;
    const scale = Math.min(maxW / canvas.width, maxH / canvas.height, 1.5);
    canvas.style.width = (canvas.width * scale) + 'px';
    canvas.style.height = (canvas.height * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>
